<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>CDE | Reset Password</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">    <link rel="stylesheet" href="{{ url_for('static', filename='css/utc_clock.css') }}">
</head>
<body class="auth-body">

<div class="utc-clock-box">
    <div class="utc-clock-title">UTC Clock</div>
    <div class="utc-clock-time" id="utc-clock-time">--:--:-- UTC</div>
    <div class="utc-clock-date" id="utc-clock-date">Loading...</div>
</div>
<div class="auth-wrapper"><div class="auth-card"><h1>Reset Password</h1><p class="auth-subtitle">Create a new password.</p>
{% with messages = get_flashed_messages(with_categories=true) %}{% for category, message in messages %}<div class="alert {{ category }}">{{ message }}</div>{% endfor %}{% endwith %}
<form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="field"><label>New Password</label><input type="password" name="password" minlength="8" required></div><div class="field"><label>Confirm Password</label><input type="password" name="confirm_password" minlength="8" required></div><button class="full-button">Save Password</button></form>
</div></div>    <script src="{{ url_for('static', filename='js/utc_clock.js') }}"></script>
    <script src="{{ url_for('static', filename='js/weather_names.js') }}"></script>
</body></html>
