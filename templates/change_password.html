{% extends "base.html" %}
{% block content %}
<section class="card small-card centered-card">
  <h1>Change Password</h1>
  <p class="muted">Create or update your account password.</p>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="field"><label>Current Password or OTP</label><input type="password" name="current_password" required></div>
    <div class="field"><label>New Password</label><input type="password" name="password" minlength="8" required></div>
    <div class="field"><label>Confirm New Password</label><input type="password" name="confirm_password" minlength="8" required></div>
    <div class="actions"><button type="submit">Save Password</button></div>
  </form>
</section>
{% endblock %}
